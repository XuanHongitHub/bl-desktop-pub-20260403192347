<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BugLogin Workspace Owner Panel Preview</title>
    <link rel="stylesheet" href="../shared/panel-preview.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <h1 id="brandTitle"></h1>
          <p id="brandSubtitle"></p>
        </div>
        <input id="searchNav" class="input" placeholder="Tìm page..." />
        <div style="display:flex; gap:8px;">
          <button id="expandAll" class="btn">Expand all</button>
          <button id="collapseAll" class="btn">Collapse all</button>
        </div>
        <div id="treeRoot"></div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2 id="pageTitle"></h2>
            <p id="pageSummary"></p>
          </div>
          <div id="metaTags" class="meta-tags"></div>
        </header>

        <section id="kpiGrid" class="kpi-grid"></section>

        <section class="toolbar">
          <div class="toolbar-left">
            <input id="toolbarSearch" class="input" />
            <select id="toolbarFilter" class="select"></select>
          </div>
          <div id="toolbarActions" class="toolbar-right"></div>
        </section>

        <section class="surface-grid">
          <article class="card">
            <h3>Dữ liệu chính của page</h3>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr id="dataTableHead"></tr>
                </thead>
                <tbody id="dataTableBody"></tbody>
              </table>
            </div>
          </article>

          <article class="card">
            <h3>Timeline / Event Feed</h3>
            <ul id="timeline" class="timeline"></ul>
          </article>
        </section>

        <section class="ux">
          <h3>UI/UX State Preview</h3>
          <div id="stateSwitch" class="state-switch">
            <button data-state="default" class="active">Default</button>
            <button data-state="loading">Loading</button>
            <button data-state="empty">Empty</button>
            <button data-state="error">Error</button>
          </div>
          <div id="stateCanvas" class="state-canvas"></div>
          <div id="patterns" class="patterns"></div>
          <ul id="featureList"></ul>
        </section>
      </main>
    </div>
