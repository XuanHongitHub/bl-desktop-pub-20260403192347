name: CI Lite

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-lite-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Detect Rust/Tauri changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            tauri:
              - 'src-tauri/**'
              - 'Cargo.toml'
              - 'pnpm-lock.yaml'
              - '.github/workflows/**'
      - name: Setup Rust
        if: steps.changes.outputs.tauri == 'true'
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        if: steps.changes.outputs.tauri == 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: "buglogin-ci-lite-rust"
      - name: Cargo check
        if: steps.changes.outputs.tauri == 'true'
        run: cd src-tauri && cargo check --locked
      - name: Skip rust-check when untouched
        if: steps.changes.outputs.tauri != 'true'
        run: echo "No src-tauri changes detected; skipping cargo check."
