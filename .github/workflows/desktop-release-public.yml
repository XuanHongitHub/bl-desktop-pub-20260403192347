name: Desktop Release (Public Repo)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (for example v0.17.1-desktop.1)"
        required: true
      publish_release:
        description: "Create GitHub Release"
        required: true
        type: boolean
        default: true
  push:
    tags:
      - "v*-desktop*"

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    env: &desktop_env
      BUGLOGIN_BROWSER_API_BASE: https://api.buglogin.com
      NEXT_PUBLIC_SYNC_SERVER_URL: https://api.buglogin.com
      NEXT_PUBLIC_WEB_PORTAL_URL: https://buglogin.com
      NEXT_PUBLIC_BILLING_PORTAL_URL: https://buglogin.com
      NEXT_PUBLIC_STRIPE_BILLING_URL: https://buglogin.com
      BUGLOGIN_AUTH_API_URL: https://api.buglogin.com
      RUSTFLAGS: -C debuginfo=0
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: buglogin-desktop-public-release-win

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installer (NSIS)
        run: pnpm tauri build --bundles nsis

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null
          Get-ChildItem -Recurse src-tauri/target/release/bundle/nsis | ForEach-Object {
            Copy-Item $_.FullName -Destination dist-release -Force
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: buglogin-desktop-windows-nsis
          path: dist-release/*
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 90
    env: *desktop_env
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: buglogin-desktop-public-release-macos

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS installer (DMG)
        run: pnpm tauri build --bundles dmg

      - name: Collect artifacts
        run: |
          mkdir -p dist-release
          cp -f src-tauri/target/release/bundle/dmg/* dist-release/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: buglogin-desktop-macos-dmg
          path: dist-release/*
          if-no-files-found: error

  create-release:
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.publish_release }}
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
          generate_release_notes: true
          files: dist-release/*

  notify-private-mirror:
    needs:
      - create-release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.publish_release }}
    env:
      SOURCE_REPO: ${{ github.repository }}
      SOURCE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
      TARGET_REPO: keyduc91/Malvanut-Login
    steps:
      - name: Trigger private mirror workflow
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing secret PRIVATE_REPO_DISPATCH_TOKEN in public repo." >&2
            exit 1
          fi

          payload=$(cat <<EOF
          {
            "event_type": "mirror-public-release",
            "client_payload": {
              "source_repo": "${SOURCE_REPO}",
              "source_tag": "${SOURCE_TAG}",
              "target_tag": "${SOURCE_TAG}"
            }
          }
          EOF
          )

          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/${TARGET_REPO}/dispatches \
            -d "${payload}"
