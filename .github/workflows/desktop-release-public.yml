name: Packaging Matrix

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag for target repo (for example v1.0.0)"
        required: true
      target_repo:
        description: "Target repository (owner/name)"
        required: true
        default: "keyduc91/Malvanut-Login"

permissions:
  contents: read

concurrency:
  group: packaging-matrix-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    env: &desktop_env
      BUGLOGIN_BROWSER_API_BASE: https://api.buglogin.com
      NEXT_PUBLIC_SYNC_SERVER_URL: https://api.buglogin.com
      NEXT_PUBLIC_WEB_PORTAL_URL: https://buglogin.com
      NEXT_PUBLIC_BILLING_PORTAL_URL: https://buglogin.com
      NEXT_PUBLIC_STRIPE_BILLING_URL: https://buglogin.com
      BUGLOGIN_AUTH_API_URL: https://api.buglogin.com
      RUSTFLAGS: -C debuginfo=0
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: buglogin-desktop-public-release-win

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installer (NSIS)
        run: pnpm tauri build --bundles nsis

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null
          Get-ChildItem -Recurse src-tauri/target/release/bundle/nsis | ForEach-Object {
            Copy-Item $_.FullName -Destination dist-release -Force
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: buglogin-desktop-windows-nsis
          path: dist-release/*
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 90
    env: *desktop_env
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: buglogin-desktop-public-release-macos

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS installer (DMG)
        run: pnpm tauri build --bundles dmg

      - name: Collect artifacts
        run: |
          mkdir -p dist-release
          cp -f src-tauri/target/release/bundle/dmg/* dist-release/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: buglogin-desktop-macos-dmg
          path: dist-release/*
          if-no-files-found: error

  publish-to-target:
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true

      - name: Publish release in target repository
        env:
          GH_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          TARGET_REPO: ${{ inputs.target_repo }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "TARGET_REPO_TOKEN secret is not configured."
            exit 1
          fi
          if [ -z "${TARGET_REPO:-}" ]; then
            echo "target_repo input is required."
            exit 1
          fi
          if [ -z "${RELEASE_TAG:-}" ]; then
            echo "release_tag input is required."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$TARGET_REPO" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist-release/* --repo "$TARGET_REPO" --clobber
          else
            gh release create "$RELEASE_TAG" dist-release/* --repo "$TARGET_REPO" --title "$RELEASE_TAG" --notes "Automated desktop package release."
          fi
