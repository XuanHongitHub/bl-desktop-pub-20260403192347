name: Release Watchdog

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  retry-until-green:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect latest tag release run
        id: inspect
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;

            const runsResp = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: "release.yml",
              event: "push",
              per_page: 20
            });

            const taggedRuns = runsResp.data.workflow_runs.filter((run) =>
              /^v\d+\.\d+\.\d+/.test(run.head_branch || "")
            );

            if (taggedRuns.length === 0) {
              core.notice("No tagged release run found.");
              core.setOutput("should_rerun", "false");
              return;
            }

            const latest = taggedRuns[0];
            core.setOutput("run_id", String(latest.id));
            core.setOutput("head_branch", latest.head_branch || "");
            core.setOutput("status", latest.status || "");
            core.setOutput("conclusion", latest.conclusion || "");

            core.notice(
              `Latest tag run: #${latest.id} (${latest.head_branch}) status=${latest.status} conclusion=${latest.conclusion}`
            );

            if (latest.status !== "completed") {
              core.notice("Latest run is still in progress. Skip rerun.");
              core.setOutput("should_rerun", "false");
              return;
            }

            const jobsResp = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: latest.id,
              per_page: 100
            });

            const jobs = jobsResp.data.jobs;
            const failureStates = ["failure", "cancelled", "timed_out", "action_required"];

            // Legacy mode: old matrix workflow had release (macos/linux/windows) jobs.
            const legacyReleaseJobs = jobs.filter((job) => job.name.startsWith("release ("));
            if (legacyReleaseJobs.length > 0) {
              const successCount = legacyReleaseJobs.filter((job) => job.conclusion === "success").length;
              const failedCount = legacyReleaseJobs.filter((job) =>
                failureStates.includes(job.conclusion || "")
              ).length;

              core.notice(`Legacy release jobs: total=${legacyReleaseJobs.length}, success=${successCount}, failed=${failedCount}`);

              const allDoneLegacy = latest.conclusion === "success" && successCount >= 3;
              if (allDoneLegacy) {
                core.notice("Legacy mode complete: all 3 release targets done.");
                core.setOutput("should_rerun", "false");
                return;
              }

              if (failedCount > 0) {
                core.setOutput("should_rerun", "true");
              } else {
                core.notice("Legacy mode: no failed release matrix job to rerun.");
                core.setOutput("should_rerun", "false");
              }
              return;
            }

            // Hybrid mode: build-frontend + release-macos
            const requiredJobNames = ["build-frontend", "release-macos"];
            const requiredJobs = requiredJobNames
              .map((name) => jobs.find((job) => job.name === name))
              .filter(Boolean);

            const successCount = requiredJobs.filter((job) => job.conclusion === "success").length;
            const failedCount = requiredJobs.filter((job) =>
              failureStates.includes(job.conclusion || "")
            ).length;
            const missingJobs = requiredJobNames.filter((name) =>
              !jobs.some((job) => job.name === name)
            );

            core.notice(
              `Hybrid required jobs: expected=${requiredJobNames.length}, found=${requiredJobs.length}, success=${successCount}, failed=${failedCount}, missing=[${missingJobs.join(", ")}]`
            );

            const allDoneHybrid =
              latest.conclusion === "success" &&
              missingJobs.length === 0 &&
              successCount === requiredJobNames.length;

            if (allDoneHybrid) {
              core.notice("Hybrid mode complete: frontend + macOS release done.");
              core.setOutput("should_rerun", "false");
              return;
            }

            if (failedCount > 0) {
              core.setOutput("should_rerun", "true");
            } else {
              core.notice("Hybrid mode: no failed required job to rerun.");
              core.setOutput("should_rerun", "false");
            }

      - name: Rerun failed jobs
        if: steps.inspect.outputs.should_rerun == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const runId = Number("${{ steps.inspect.outputs.run_id }}");

            await github.request(
              "POST /repos/{owner}/{repo}/actions/runs/{run_id}/rerun-failed-jobs",
              { owner, repo, run_id: runId }
            );

            core.notice(`Triggered rerun-failed-jobs for run #${runId}.`);
