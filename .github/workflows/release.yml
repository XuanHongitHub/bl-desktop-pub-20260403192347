name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish (example: v0.17.6)"
        type: string
        required: true
      prerelease:
        description: "Mark GitHub release as prerelease"
        type: boolean
        required: true
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.event.inputs.release_tag || github.run_id }}
  cancel-in-progress: true

env:
  # Cấu hình Node 24 và các biến tối ưu nhất hiện nay
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PNPM_CACHE_FOLDER: .pnpm-store

jobs:
  # JOB 1: Build frontend once
  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - name: Install & Build Frontend
        run: |
          pnpm install --frozen-lockfile --prefer-offline
          pnpm exec next build
      - name: Upload Frontend Dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: error
          compression-level: 0

  # JOB 2: macOS release on GitHub Actions (Windows/Linux are local-manual uploads)
  release-macos:
    needs: build-frontend
    timeout-minutes: 120
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Frontend Dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: "buglogin-release-cache-macos"

      - name: Install dependencies (No Build Frontend)
        run: pnpm install --frozen-lockfile --ignore-scripts --prefer-offline

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          TARGET: aarch64-apple-darwin
          PROFILE: release
        with:
          projectPath: ./src-tauri
          tagName: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          releaseName: "BugLogin ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}"
          releaseBody: "Bản phát hành tự động của BugLogin."
          releaseDraft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true' || false }}
          args: "--target aarch64-apple-darwin --verbose"

      - name: Zip and Upload MacOS App (Anti-Gatekeeper)
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}"
          VERSION=${TAG_NAME#v}
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/macos/
          ditto -c -k --sequesterRsrc --keepParent BugLogin.app buglogin-runner-darwin-arm64-${VERSION}.zip
          gh release upload "${TAG_NAME}" buglogin-runner-darwin-arm64-${VERSION}.zip --clobber

      - name: Release Summary For Local Windows/Linux Upload
        run: |
          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}"
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Hybrid release mode (quota-saving)
          - GitHub Actions builds: macOS only.
          - Windows and Linux builds: local/manual, then upload to the same \`${TAG_NAME}\` release.
          - Do not share \`node_modules\` between Windows and WSL/Linux.
          - Recommended: separate working copies (Windows repo path and WSL repo path).

          ### Manual upload examples
          \`\`\`bash
          gh release upload ${TAG_NAME} <windows-asset-file> --clobber
          gh release upload ${TAG_NAME} <windows-asset-file>.sig --clobber
          gh release upload ${TAG_NAME} <linux-asset-file> --clobber
          gh release upload ${TAG_NAME} <linux-asset-file>.sig --clobber
          \`\`\`
          EOF
