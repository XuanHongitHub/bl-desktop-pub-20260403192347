name: Release Asset Sync

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Source repository (owner/name)"
        required: true
        default: "XuanHongitHub/ops-snapshot-labs"
      source_tag:
        description: "Source tag to copy (e.g. v0.17.1-desktop.5)"
        required: true
      target_tag:
        description: "Target tag on this repo (leave empty = source_tag)"
        required: false
      make_latest:
        description: "Mark target release as latest"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tags and repos
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_REPO="${{ inputs.source_repo }}"
          SOURCE_TAG="${{ inputs.source_tag }}"
          TARGET_TAG="${{ inputs.target_tag }}"

          if [ -z "${SOURCE_REPO:-}" ] || [ -z "${SOURCE_TAG:-}" ]; then
            echo "Missing source repo/tag payload" >&2
            exit 1
          fi

          if [ -z "${TARGET_TAG:-}" ]; then
            TARGET_TAG="$SOURCE_TAG"
          fi

          echo "SOURCE_REPO=$SOURCE_REPO" >> "$GITHUB_ENV"
          echo "SOURCE_TAG=$SOURCE_TAG" >> "$GITHUB_ENV"
          echo "TARGET_TAG=$TARGET_TAG" >> "$GITHUB_ENV"
          echo "TARGET_REPO=${GITHUB_REPOSITORY}" >> "$GITHUB_ENV"

      - name: Download assets from source release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p mirrored-assets
          gh release download "$SOURCE_TAG" \
            --repo "$SOURCE_REPO" \
            --dir mirrored-assets
          ls -lah mirrored-assets

      - name: Create checksums
        run: |
          set -euo pipefail
          (cd mirrored-assets && sha256sum * > SHA256SUMS.txt)

      - name: Ensure target release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "$TARGET_TAG" --repo "$TARGET_REPO" >/dev/null 2>&1; then
            echo "Release $TARGET_TAG already exists"
          else
            gh release create "$TARGET_TAG" \
              --repo "$TARGET_REPO" \
              --title "$TARGET_TAG" \
              --notes "Mirrored assets from $SOURCE_REPO@$SOURCE_TAG"
          fi

      - name: Upload mirrored assets to target release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "$TARGET_TAG" mirrored-assets/* \
            --repo "$TARGET_REPO" \
            --clobber

      - name: Mark latest (optional)
        if: ${{ inputs.make_latest }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release edit "$TARGET_TAG" --repo "$TARGET_REPO" --latest
