version: 2

updates:
  # Keep dependency automation low-noise for private quota.
  # Security fixes are still surfaced by GitHub advisories.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 1
    allow:
      - dependency-type: "all"
    groups:
      frontend-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
      include: "scope"

  # Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 1
    allow:
      - dependency-type: "all"
    groups:
      rust-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "deps(rust)"
      include: "scope"
